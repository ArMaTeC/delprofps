name: DelprofPS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: PSScriptAnalyzer Lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer on delprofPS.ps1
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path .\delprofPS.ps1 -Settings .\PSScriptAnalyzerSettings.psd1 -Severity Error
          if ($results) {
              $results | Format-Table -AutoSize
              throw "PSScriptAnalyzer found $($results.Count) error(s)"
          }
          Write-Host "PSScriptAnalyzer: No errors found" -ForegroundColor Green

      - name: Run PSScriptAnalyzer on DelprofPS-GUI.ps1
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path .\DelprofPS-GUI.ps1 -Settings .\PSScriptAnalyzerSettings.psd1 -Severity Error
          if ($results) {
              $results | Format-Table -AutoSize
              throw "PSScriptAnalyzer found $($results.Count) error(s)"
          }
          Write-Host "PSScriptAnalyzer: No errors found" -ForegroundColor Green

  test:
    name: Pester Tests
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser -MinimumVersion 5.0

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = '.\DelprofPS.Pester.Tests.ps1'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = '.\test-results.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'
          Invoke-Pester -Configuration $config

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  validate-manifest:
    name: Validate Module Manifest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test Module Manifest
        shell: pwsh
        run: |
          $manifest = Test-ModuleManifest -Path .\DelprofPS.psd1 -ErrorAction Stop
          Write-Host "Module: $($manifest.Name) v$($manifest.Version)" -ForegroundColor Green
          Write-Host "Description: $($manifest.Description)" -ForegroundColor Cyan

  release:
    name: Create Release Package
    runs-on: windows-latest
    needs: [ lint, test, validate-manifest ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build Release Package
        shell: pwsh
        run: |
          .\Build.ps1 -Task Package

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DelprofPS-Release
          path: ./release/*.zip
